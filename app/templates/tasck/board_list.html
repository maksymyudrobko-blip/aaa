<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h2>Мої та публічні дошки</h2>
<form action="{% url 'logout' %}" method="post"><button type="submit">{% csrf_token %}Вийти</button></form>
<a href="{% url 'board_create' %}">Створити нову дошку</a>
<ul>
    {% for board in boards %}
        <li><a href="{% url 'board_detail' board.id %}">{{ board.name }}</a> (Власник: {{ board.owner.username }})</li>
    {% endfor %}
</ul>
</body>
</html>
