<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h2>Дошка: {{ board.name }}</h2>
<a href="{% url 'board_list' %}">Назад</a> |
<a href="{% url 'task_create' board.id %}">Додати завдання</a>
<ul>
    {% for task in tasks %}
        <li><a href="{% url 'task_detail' task.id %}">{{ task.title }}</a> - {{ task.get_status_display }}</li>
    {% endfor %}
</ul>
</body>
</html>
